<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Pszczelarz przy pracy w pasiece">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="60%" stop-color="#bbdefb"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81c784"/>
      <stop offset="40%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#4caf50"/>
    </linearGradient>
    <linearGradient id="hive-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#ffb300"/>
    </linearGradient>
    <linearGradient id="hive-roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#5d4037"/>
    </linearGradient>
    <linearGradient id="tree-trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="50%" stop-color="#6d4c41"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <radialGradient id="sun-glow" cx="75%" cy="15%" r="35%">
      <stop offset="0%" stop-color="#fff9c4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </radialGradient>
    <filter id="tree-shadow">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#1b5e20" flood-opacity="0.15"/>
    </filter>
    <filter id="hive-shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#3e2723" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <circle cx="600" cy="90" r="200" fill="url(#sun-glow)"/>

  <!-- Distant trees -->
  <g opacity="0.3">
    <ellipse cx="50" cy="290" rx="60" ry="80" fill="#388e3c"/>
    <ellipse cx="150" cy="280" rx="55" ry="90" fill="#2e7d32"/>
    <ellipse cx="680" cy="275" rx="65" ry="85" fill="#388e3c"/>
    <ellipse cx="760" cy="285" rx="50" ry="75" fill="#2e7d32"/>
    <ellipse cx="400" cy="270" rx="70" ry="60" fill="#43a047" opacity="0.5"/>
  </g>

  <!-- Ground -->
  <ellipse cx="400" cy="520" rx="500" ry="160" fill="url(#ground)"/>
  <!-- Ground texture -->
  <ellipse cx="400" cy="510" rx="450" ry="130" fill="#66bb6a" opacity="0.5"/>

  <!-- Left tree -->
  <g filter="url(#tree-shadow)">
    <rect x="85" y="250" width="30" height="200" rx="5" fill="url(#tree-trunk)"/>
    <ellipse cx="100" cy="230" rx="75" ry="90" fill="#43a047"/>
    <ellipse cx="80" cy="210" rx="55" ry="70" fill="#4caf50"/>
    <ellipse cx="115" cy="200" rx="50" ry="65" fill="#66bb6a" opacity="0.7"/>
  </g>

  <!-- Right tree -->
  <g filter="url(#tree-shadow)">
    <rect x="660" y="270" width="25" height="180" rx="5" fill="url(#tree-trunk)"/>
    <ellipse cx="672" cy="255" rx="65" ry="80" fill="#43a047"/>
    <ellipse cx="685" cy="240" rx="50" ry="60" fill="#4caf50"/>
    <ellipse cx="665" cy="235" rx="45" ry="55" fill="#66bb6a" opacity="0.7"/>
  </g>

  <!-- Beehive 1 (left) -->
  <g transform="translate(260 340)" filter="url(#hive-shadow)">
    <rect x="-30" y="0" width="60" height="90" rx="5" fill="url(#hive-body)" stroke="#e6a800" stroke-width="1.5"/>
    <!-- Hive layers -->
    <line x1="-28" y1="22" x2="28" y2="22" stroke="#e6a800" stroke-width="1"/>
    <line x1="-28" y1="44" x2="28" y2="44" stroke="#e6a800" stroke-width="1"/>
    <line x1="-28" y1="66" x2="28" y2="66" stroke="#e6a800" stroke-width="1"/>
    <!-- Entrance -->
    <rect x="-8" y="78" width="16" height="12" rx="3" fill="#5d4037"/>
    <!-- Roof -->
    <polygon points="-40,-5 40,-5 35,2 -35,2" fill="url(#hive-roof)"/>
    <polygon points="-44,-12 44,-12 40,-5 -40,-5" fill="#795548"/>
    <!-- Landing board -->
    <rect x="-12" y="88" width="24" height="4" rx="1" fill="#8d6e63"/>
  </g>

  <!-- Beehive 2 (center) -->
  <g transform="translate(400 350)" filter="url(#hive-shadow)">
    <rect x="-32" y="0" width="64" height="95" rx="5" fill="url(#hive-body)" stroke="#e6a800" stroke-width="1.5"/>
    <line x1="-30" y1="24" x2="30" y2="24" stroke="#e6a800" stroke-width="1"/>
    <line x1="-30" y1="48" x2="30" y2="48" stroke="#e6a800" stroke-width="1"/>
    <line x1="-30" y1="72" x2="30" y2="72" stroke="#e6a800" stroke-width="1"/>
    <rect x="-8" y="82" width="16" height="13" rx="3" fill="#5d4037"/>
    <polygon points="-42,-5 42,-5 37,2 -37,2" fill="url(#hive-roof)"/>
    <polygon points="-46,-12 46,-12 42,-5 -42,-5" fill="#795548"/>
    <rect x="-12" y="93" width="24" height="4" rx="1" fill="#8d6e63"/>
  </g>

  <!-- Beehive 3 (right) -->
  <g transform="translate(530 345)" filter="url(#hive-shadow)">
    <rect x="-28" y="0" width="56" height="85" rx="5" fill="url(#hive-body)" stroke="#e6a800" stroke-width="1.5"/>
    <line x1="-26" y1="21" x2="26" y2="21" stroke="#e6a800" stroke-width="1"/>
    <line x1="-26" y1="42" x2="26" y2="42" stroke="#e6a800" stroke-width="1"/>
    <line x1="-26" y1="63" x2="26" y2="63" stroke="#e6a800" stroke-width="1"/>
    <rect x="-7" y="74" width="14" height="11" rx="3" fill="#5d4037"/>
    <polygon points="-38,-5 38,-5 33,2 -33,2" fill="url(#hive-roof)"/>
    <polygon points="-42,-12 42,-12 38,-5 -38,-5" fill="#795548"/>
    <rect x="-10" y="83" width="20" height="4" rx="1" fill="#8d6e63"/>
  </g>

  <!-- Beekeeper -->
  <g transform="translate(340 310)">
    <!-- Body -->
    <rect x="-18" y="10" width="36" height="55" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
    <!-- Head / hat -->
    <circle cx="0" cy="-5" r="16" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
    <!-- Hat brim -->
    <ellipse cx="0" cy="-15" rx="22" ry="6" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
    <!-- Veil -->
    <path d="M-16,-5 Q-18,10 -14,15" fill="none" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="2 2"/>
    <path d="M16,-5 Q18,10 14,15" fill="none" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="2 2"/>
    <!-- Arms -->
    <line x1="-18" y1="25" x2="-35" y2="15" stroke="#fafafa" stroke-width="8" stroke-linecap="round"/>
    <line x1="18" y1="25" x2="30" y2="40" stroke="#fafafa" stroke-width="8" stroke-linecap="round"/>
    <!-- Gloves -->
    <circle cx="-37" cy="13" r="5" fill="#fdd835"/>
    <circle cx="32" cy="42" r="5" fill="#fdd835"/>
    <!-- Legs -->
    <line x1="-8" y1="65" x2="-10" y2="90" stroke="#fafafa" stroke-width="7" stroke-linecap="round"/>
    <line x1="8" y1="65" x2="10" y2="90" stroke="#fafafa" stroke-width="7" stroke-linecap="round"/>
    <!-- Boots -->
    <rect x="-14" y="86" width="10" height="8" rx="3" fill="#5d4037"/>
    <rect x="5" y="86" width="10" height="8" rx="3" fill="#5d4037"/>
    <!-- Smoker in hand -->
    <g transform="translate(32 42)">
      <rect x="-4" y="-12" width="8" height="14" rx="2" fill="#9e9e9e"/>
      <path d="M-2,-14 Q0,-22 2,-14" fill="none" stroke="#bdbdbd" stroke-width="1.5" opacity="0.6"/>
      <path d="M-1,-18 Q1,-26 3,-18" fill="none" stroke="#bdbdbd" stroke-width="1" opacity="0.4"/>
    </g>
  </g>

  <!-- Flying bees -->
  <g>
    <g transform="translate(300 280) rotate(-20)" opacity="0.5">
      <ellipse cx="0" cy="0" rx="7" ry="5" fill="#ffd54f"/>
      <line x1="-1" y1="-1" x2="-1" y2="1" stroke="#3e2723" stroke-width="1"/>
      <line x1="2" y1="-1" x2="2" y2="1" stroke="#3e2723" stroke-width="1"/>
      <ellipse cx="-3" cy="-4" rx="4" ry="2.5" fill="#fff" opacity="0.6" transform="rotate(-15 -3 -4)"/>
      <ellipse cx="3" cy="-4" rx="4" ry="2.5" fill="#fff" opacity="0.6" transform="rotate(15 3 -4)"/>
    </g>
    <g transform="translate(450 300) rotate(15)" opacity="0.45">
      <ellipse cx="0" cy="0" rx="6" ry="4" fill="#ffd54f"/>
      <line x1="-1" y1="-1" x2="-1" y2="1" stroke="#3e2723" stroke-width="1"/>
      <line x1="2" y1="-1" x2="2" y2="1" stroke="#3e2723" stroke-width="1"/>
      <ellipse cx="-3" cy="-3" rx="3.5" ry="2" fill="#fff" opacity="0.6"/>
      <ellipse cx="3" cy="-3" rx="3.5" ry="2" fill="#fff" opacity="0.6"/>
    </g>
    <g transform="translate(500 310) rotate(-5)" opacity="0.35">
      <ellipse cx="0" cy="0" rx="5" ry="3.5" fill="#ffd54f"/>
      <line x1="0" y1="-1" x2="0" y2="1" stroke="#3e2723" stroke-width="1"/>
      <ellipse cx="-2" cy="-3" rx="3" ry="2" fill="#fff" opacity="0.5"/>
      <ellipse cx="2" cy="-3" rx="3" ry="2" fill="#fff" opacity="0.5"/>
    </g>
    <g transform="translate(270 310) rotate(30)" opacity="0.3">
      <ellipse cx="0" cy="0" rx="5" ry="3" fill="#ffd54f"/>
      <ellipse cx="-2" cy="-2.5" rx="3" ry="1.5" fill="#fff" opacity="0.5"/>
      <ellipse cx="2" cy="-2.5" rx="3" ry="1.5" fill="#fff" opacity="0.5"/>
    </g>
  </g>

  <!-- Wildflowers in foreground -->
  <g opacity="0.5">
    <!-- Left flowers -->
    <g transform="translate(180 470)">
      <line x1="0" y1="20" x2="0" y2="-5" stroke="#388e3c" stroke-width="1.5"/>
      <circle cx="0" cy="-8" r="4" fill="#fff176"/>
      <circle cx="0" cy="-8" r="2" fill="#f9a825"/>
    </g>
    <g transform="translate(200 480)">
      <line x1="0" y1="15" x2="0" y2="-3" stroke="#388e3c" stroke-width="1.5"/>
      <circle cx="0" cy="-5" r="3.5" fill="#ef9a9a"/>
      <circle cx="0" cy="-5" r="1.5" fill="#c62828"/>
    </g>
    <!-- Right flowers -->
    <g transform="translate(580 465)">
      <line x1="0" y1="18" x2="0" y2="-4" stroke="#388e3c" stroke-width="1.5"/>
      <circle cx="0" cy="-7" r="4" fill="#90caf9"/>
      <circle cx="0" cy="-7" r="2" fill="#1565c0"/>
    </g>
    <g transform="translate(610 478)">
      <line x1="0" y1="14" x2="0" y2="-3" stroke="#388e3c" stroke-width="1.5"/>
      <circle cx="0" cy="-6" r="3.5" fill="#ce93d8"/>
      <circle cx="0" cy="-6" r="1.5" fill="#7b1fa2"/>
    </g>
    <!-- Grass tufts -->
    <g stroke="#388e3c" stroke-width="1.5" fill="none">
      <path d="M150,490 Q155,475 152,460"/>
      <path d="M155,490 Q160,478 158,465"/>
      <path d="M620,485 Q625,472 623,458"/>
      <path d="M625,485 Q630,475 628,462"/>
    </g>
  </g>

  <!-- Clouds -->
  <g opacity="0.4" fill="#ffffff">
    <ellipse cx="180" cy="80" rx="60" ry="25"/>
    <ellipse cx="210" cy="70" rx="45" ry="20"/>
    <ellipse cx="550" cy="60" rx="50" ry="22"/>
    <ellipse cx="575" cy="52" rx="35" ry="18"/>
  </g>

  <!-- Sun rays hint -->
  <g opacity="0.08" stroke="#fdd835" stroke-width="2" fill="none">
    <line x1="620" y1="40" x2="650" y2="10"/>
    <line x1="640" y1="55" x2="680" y2="35"/>
    <line x1="650" y1="80" x2="695" y2="70"/>
  </g>
</svg>
