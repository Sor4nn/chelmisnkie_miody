<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Słoik miodu gryczanego">
  <defs>
    <linearGradient id="bg-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf0e6"/>
      <stop offset="40%" stop-color="#f0e0cc"/>
      <stop offset="100%" stop-color="#d7c4a8"/>
    </linearGradient>
    <linearGradient id="jar-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0522d"/>
      <stop offset="35%" stop-color="#8b4513"/>
      <stop offset="100%" stop-color="#5c2e0a"/>
    </linearGradient>
    <linearGradient id="lid-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="50%" stop-color="#3e2723"/>
      <stop offset="100%" stop-color="#1b0e05"/>
    </linearGradient>
    <linearGradient id="label-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffff2"/>
      <stop offset="100%" stop-color="#f5eed8"/>
    </linearGradient>
    <linearGradient id="glass-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow-g" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#efebe9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#efebe9" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-g">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#3e2723" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg-g)"/>
  <circle cx="300" cy="280" r="220" fill="url(#glow-g)"/>

  <!-- Decorative buckwheat plants -->
  <g opacity="0.18">
    <!-- Left buckwheat stem -->
    <g transform="translate(90 130)">
      <line x1="0" y1="60" x2="0" y2="-20" stroke="#6d4c41" stroke-width="2"/>
      <circle cx="-4" cy="-15" r="2.5" fill="#d7ccc8"/>
      <circle cx="4" cy="-20" r="2.5" fill="#d7ccc8"/>
      <circle cx="-2" cy="-25" r="2" fill="#d7ccc8"/>
      <circle cx="3" cy="-10" r="2.5" fill="#d7ccc8"/>
      <circle cx="-3" cy="-5" r="2" fill="#efebe9"/>
      <ellipse cx="-15" cy="10" rx="12" ry="6" fill="#8bc34a" transform="rotate(-30 -15 10)"/>
      <ellipse cx="15" cy="20" rx="12" ry="6" fill="#8bc34a" transform="rotate(20 15 20)"/>
    </g>
    <!-- Right buckwheat stem -->
    <g transform="translate(510 420)">
      <line x1="0" y1="50" x2="0" y2="-15" stroke="#6d4c41" stroke-width="2"/>
      <circle cx="-3" cy="-12" r="2.5" fill="#d7ccc8"/>
      <circle cx="4" cy="-8" r="2.5" fill="#d7ccc8"/>
      <circle cx="-2" cy="-18" r="2" fill="#d7ccc8"/>
      <circle cx="3" cy="-3" r="2" fill="#efebe9"/>
      <ellipse cx="-14" cy="8" rx="11" ry="5" fill="#8bc34a" transform="rotate(-25 -14 8)"/>
      <ellipse cx="14" cy="18" rx="11" ry="5" fill="#8bc34a" transform="rotate(30 14 18)"/>
    </g>
    <!-- Scattered buckwheat seeds -->
    <g fill="#795548">
      <polygon points="80,490 86,480 92,490" />
      <polygon points="520,110 526,100 532,110" />
      <polygon points="130,540 135,532 140,540" />
      <polygon points="475,540 480,532 485,540" />
    </g>
  </g>

  <!-- Jar body -->
  <g filter="url(#shadow-g)">
    <path d="M195 200 Q195 160 220 145 L380 145 Q405 160 405 200 L405 440 Q405 480 370 490 L230 490 Q195 480 195 440 Z" fill="url(#jar-g)"/>

    <!-- Glass reflection -->
    <path d="M205 200 Q205 170 225 155 L240 155 Q215 170 215 200 L215 430 Q215 465 235 475 L225 478 Q205 468 205 430 Z" fill="url(#glass-g)" opacity="0.6"/>

    <!-- Honey level line -->
    <path d="M195 210 Q300 222 405 210" fill="none" stroke="#3e1a00" stroke-width="1.5" opacity="0.25"/>

    <!-- Depth highlight -->
    <path d="M200 400 Q300 415 400 400 L400 440 Q400 475 370 485 L230 485 Q200 475 200 440 Z" fill="#3e1a00" opacity="0.15"/>
  </g>

  <!-- Honey drip -->
  <path d="M398 275 Q410 285 408 315 Q406 340 400 345 L400 275 Z" fill="#5c2e0a" opacity="0.5"/>

  <!-- Label -->
  <g>
    <rect x="220" y="310" width="160" height="130" rx="8" fill="url(#label-g)" stroke="#8d6e63" stroke-width="1.5"/>
    <rect x="228" y="318" width="144" height="114" rx="5" fill="none" stroke="#a1887f" stroke-width="0.75" stroke-dasharray="3 2"/>

    <!-- Buckwheat motif on label -->
    <g transform="translate(300 348)">
      <line x1="0" y1="8" x2="0" y2="-12" stroke="#8d6e63" stroke-width="1.5"/>
      <circle cx="-3" cy="-8" r="3" fill="#a1887f"/>
      <circle cx="3" cy="-12" r="3" fill="#8d6e63"/>
      <circle cx="-2" cy="-3" r="2.5" fill="#bcaaa4"/>
      <circle cx="4" cy="-5" r="2.5" fill="#a1887f"/>
      <ellipse cx="-10" cy="2" rx="8" ry="4" fill="#aed581" transform="rotate(-25 -10 2)"/>
      <ellipse cx="10" cy="2" rx="8" ry="4" fill="#aed581" transform="rotate(25 10 2)"/>
    </g>

    <!-- Label text -->
    <text x="300" y="388" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="18" font-weight="700" fill="#3e2723" letter-spacing="1">MIÓD</text>
    <text x="300" y="408" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="12" fill="#5d4037" letter-spacing="2">GRYCZANY</text>

    <line x1="255" y1="418" x2="345" y2="418" stroke="#8d6e63" stroke-width="1"/>
    <text x="300" y="432" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8d6e63" letter-spacing="2">PASIEKA LAS</text>
  </g>

  <!-- Jar neck -->
  <rect x="235" y="130" width="130" height="22" rx="4" fill="#3e2723"/>

  <!-- Lid -->
  <path d="M245 130 Q245 105 260 98 L340 98 Q355 105 355 130 Z" fill="url(#lid-g)"/>
  <path d="M258 108 Q260 102 275 100 L300 100 Q268 102 262 112 Z" fill="#6d4c41" opacity="0.4"/>

  <!-- Cloth ribbon -->
  <path d="M230 138 Q300 152 370 138" fill="none" stroke="#4e342e" stroke-width="2" opacity="0.5"/>
  <circle cx="300" cy="146" r="4" fill="#4e342e" opacity="0.5"/>

  <!-- Iron icon badge -->
  <g transform="translate(430 180)" opacity="0.25">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#5d4037" stroke-width="1.5"/>
    <text x="0" y="1" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="#5d4037" dominant-baseline="middle">Fe</text>
    <text x="0" y="11" text-anchor="middle" font-family="Inter, sans-serif" font-size="5" fill="#795548">ŻELAZO</text>
  </g>

  <!-- Weight badge -->
  <g transform="translate(300 520)">
    <rect x="-30" y="-12" width="60" height="24" rx="12" fill="#3e2723" opacity="0.08"/>
    <text x="0" y="5" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#6d4c41">500 g</text>
  </g>
</svg>
