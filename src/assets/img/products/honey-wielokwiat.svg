<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Słoik miodu wielokwiatowego">
  <defs>
    <linearGradient id="bg-w" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffef5"/>
      <stop offset="40%" stop-color="#fff9e6"/>
      <stop offset="100%" stop-color="#f8edc8"/>
    </linearGradient>
    <linearGradient id="jar-w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffca28"/>
      <stop offset="35%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </linearGradient>
    <linearGradient id="lid-w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#795548"/>
      <stop offset="50%" stop-color="#5d4037"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </linearGradient>
    <linearGradient id="label-w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffff5"/>
      <stop offset="100%" stop-color="#fef6e0"/>
    </linearGradient>
    <linearGradient id="glass-w" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow-w" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fff3e0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fff3e0" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-w">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4e342e" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg-w)"/>
  <circle cx="300" cy="280" r="220" fill="url(#glow-w)"/>

  <!-- Decorative wildflowers -->
  <g opacity="0.2">
    <!-- Lavender -->
    <g transform="translate(85 170)">
      <line x1="0" y1="30" x2="0" y2="-5" stroke="#66bb6a" stroke-width="2"/>
      <circle cx="0" cy="-8" r="4" fill="#ce93d8"/>
      <circle cx="-4" cy="-3" r="3.5" fill="#ba68c8"/>
      <circle cx="4" cy="-3" r="3.5" fill="#ce93d8"/>
      <circle cx="0" cy="0" r="3" fill="#ab47bc"/>
    </g>
    <!-- Daisy -->
    <g transform="translate(515 160)">
      <line x1="0" y1="25" x2="0" y2="0" stroke="#66bb6a" stroke-width="2"/>
      <ellipse cx="0" cy="-8" rx="3" ry="7" fill="#fff"/>
      <ellipse cx="0" cy="8" rx="3" ry="7" fill="#fff" transform="rotate(60 0 0)"/>
      <ellipse cx="0" cy="8" rx="3" ry="7" fill="#fff" transform="rotate(120 0 0)"/>
      <ellipse cx="0" cy="8" rx="3" ry="7" fill="#fff" transform="rotate(180 0 0)"/>
      <ellipse cx="0" cy="8" rx="3" ry="7" fill="#fff" transform="rotate(240 0 0)"/>
      <ellipse cx="0" cy="8" rx="3" ry="7" fill="#fff" transform="rotate(300 0 0)"/>
      <circle cx="0" cy="0" r="4" fill="#fdd835"/>
    </g>
    <!-- Cornflower -->
    <g transform="translate(95 470)">
      <line x1="0" y1="20" x2="0" y2="-5" stroke="#66bb6a" stroke-width="1.5"/>
      <circle cx="0" cy="-5" r="3" fill="#42a5f5"/>
      <circle cx="5" cy="-2" r="2.5" fill="#64b5f6"/>
      <circle cx="-5" cy="-2" r="2.5" fill="#42a5f5"/>
      <circle cx="3" cy="3" r="2.5" fill="#64b5f6"/>
      <circle cx="-3" cy="3" r="2.5" fill="#42a5f5"/>
      <circle cx="0" cy="0" r="2" fill="#1565c0"/>
    </g>
    <!-- Red poppy -->
    <g transform="translate(505 480)">
      <line x1="0" y1="22" x2="0" y2="-2" stroke="#66bb6a" stroke-width="1.5"/>
      <ellipse cx="0" cy="-5" rx="7" ry="5" fill="#ef5350"/>
      <ellipse cx="-5" cy="0" rx="5" ry="7" fill="#e53935"/>
      <ellipse cx="5" cy="0" rx="5" ry="7" fill="#ef5350"/>
      <circle cx="0" cy="0" r="3" fill="#1b5e20"/>
    </g>
    <!-- Small flowers scattered -->
    <circle cx="150" cy="540" r="3" fill="#f48fb1" opacity="0.5"/>
    <circle cx="450" cy="105" r="2.5" fill="#ce93d8" opacity="0.5"/>
    <circle cx="160" cy="95" r="2" fill="#81c784" opacity="0.5"/>
    <circle cx="440" cy="540" r="2.5" fill="#ffb74d" opacity="0.4"/>
  </g>

  <!-- Jar body -->
  <g filter="url(#shadow-w)">
    <path d="M195 200 Q195 160 220 145 L380 145 Q405 160 405 200 L405 440 Q405 480 370 490 L230 490 Q195 480 195 440 Z" fill="url(#jar-w)"/>

    <!-- Glass reflection -->
    <path d="M205 200 Q205 170 225 155 L240 155 Q215 170 215 200 L215 430 Q215 465 235 475 L225 478 Q205 468 205 430 Z" fill="url(#glass-w)" opacity="0.7"/>

    <!-- Honey level line -->
    <path d="M195 215 Q300 228 405 215" fill="none" stroke="#b8860b" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Honey drip -->
  <path d="M400 290 Q414 300 412 330 Q410 352 403 356 L403 290 Z" fill="#cc8800" opacity="0.6"/>

  <!-- Label -->
  <g>
    <rect x="220" y="310" width="160" height="130" rx="8" fill="url(#label-w)" stroke="#c8a44e" stroke-width="1.5"/>
    <rect x="228" y="318" width="144" height="114" rx="5" fill="none" stroke="#dcc176" stroke-width="0.75" stroke-dasharray="3 2"/>

    <!-- Flower bouquet on label -->
    <g transform="translate(300 348)">
      <line x1="-8" y1="10" x2="-5" y2="-2" stroke="#66bb6a" stroke-width="1.5"/>
      <line x1="0" y1="10" x2="0" y2="-6" stroke="#66bb6a" stroke-width="1.5"/>
      <line x1="8" y1="10" x2="5" y2="-2" stroke="#66bb6a" stroke-width="1.5"/>
      <circle cx="-6" cy="-5" r="4" fill="#ef9a9a"/>
      <circle cx="0" cy="-9" r="4.5" fill="#fff176"/>
      <circle cx="6" cy="-5" r="4" fill="#90caf9"/>
      <circle cx="-6" cy="-5" r="2" fill="#e57373"/>
      <circle cx="0" cy="-9" r="2" fill="#fdd835"/>
      <circle cx="6" cy="-5" r="2" fill="#42a5f5"/>
    </g>

    <!-- Label text -->
    <text x="300" y="385" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="18" font-weight="700" fill="#3e2723" letter-spacing="1">MIÓD</text>
    <text x="300" y="407" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="11" fill="#5d4037" letter-spacing="2">WIELOKWIATOWY</text>

    <line x1="255" y1="416" x2="345" y2="416" stroke="#c8a44e" stroke-width="1"/>
    <text x="300" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8d6e63" letter-spacing="2">PASIEKA LAS</text>
  </g>

  <!-- Jar neck -->
  <rect x="235" y="130" width="130" height="22" rx="4" fill="#5d4037"/>

  <!-- Lid -->
  <path d="M245 130 Q245 105 260 98 L340 98 Q355 105 355 130 Z" fill="url(#lid-w)"/>
  <path d="M258 108 Q260 102 275 100 L300 100 Q268 102 262 112 Z" fill="#8d6e63" opacity="0.5"/>

  <!-- Cloth ribbon -->
  <path d="M230 138 Q300 152 370 138" fill="none" stroke="#bf360c" stroke-width="2" opacity="0.5"/>
  <circle cx="300" cy="146" r="4" fill="#bf360c" opacity="0.5"/>

  <!-- Bees -->
  <g transform="translate(155 320) rotate(10)" opacity="0.3">
    <ellipse cx="0" cy="0" rx="9" ry="6" fill="#ffd54f"/>
    <line x1="-2" y1="-1.5" x2="-2" y2="1.5" stroke="#3e2723" stroke-width="1.5"/>
    <line x1="3" y1="-1.5" x2="3" y2="1.5" stroke="#3e2723" stroke-width="1.5"/>
    <ellipse cx="-4" cy="-5" rx="5" ry="3" fill="#fff" opacity="0.5" transform="rotate(-20 -4 -5)"/>
    <ellipse cx="4" cy="-5" rx="5" ry="3" fill="#fff" opacity="0.5" transform="rotate(20 4 -5)"/>
  </g>

  <!-- Weight badge -->
  <g transform="translate(300 520)">
    <rect x="-30" y="-12" width="60" height="24" rx="12" fill="#3e2723" opacity="0.08"/>
    <text x="0" y="5" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#795548">500 g</text>
  </g>
</svg>
