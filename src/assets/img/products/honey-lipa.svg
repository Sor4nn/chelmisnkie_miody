<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Słoik miodu lipowego">
  <defs>
    <linearGradient id="bg-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf5"/>
      <stop offset="40%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#f5e6b8"/>
    </linearGradient>
    <linearGradient id="jar-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="30%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#e6a800"/>
    </linearGradient>
    <linearGradient id="lid-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="50%" stop-color="#6d4c41"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <linearGradient id="label-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffef9"/>
      <stop offset="100%" stop-color="#faf3e0"/>
    </linearGradient>
    <linearGradient id="glass-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow-l" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fff8e1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fff8e1" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-l">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#5d4037" flood-opacity="0.2"/>
    </filter>
    <filter id="inner-glow-l">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#fff8e1" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="jar-clip-l">
      <path d="M195 200 Q195 160 220 145 L380 145 Q405 160 405 200 L405 440 Q405 480 370 490 L230 490 Q195 480 195 440 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg-l)"/>
  <circle cx="300" cy="280" r="220" fill="url(#glow-l)"/>

  <!-- Decorative linden leaves -->
  <g opacity="0.15" fill="#7cb342">
    <ellipse cx="90" cy="120" rx="35" ry="18" transform="rotate(-30 90 120)"/>
    <ellipse cx="110" cy="105" rx="30" ry="15" transform="rotate(15 110 105)"/>
    <ellipse cx="510" cy="460" rx="32" ry="16" transform="rotate(20 510 460)"/>
    <ellipse cx="530" cy="445" rx="28" ry="14" transform="rotate(-25 530 445)"/>
    <ellipse cx="80" cy="480" rx="25" ry="12" transform="rotate(10 80 480)"/>
    <ellipse cx="520" cy="130" rx="22" ry="11" transform="rotate(-15 520 130)"/>
  </g>

  <!-- Decorative linden flowers -->
  <g opacity="0.2">
    <g transform="translate(100 190) scale(0.7)">
      <circle cx="0" cy="0" r="6" fill="#fff9c4"/>
      <circle cx="10" cy="-4" r="5" fill="#fff9c4"/>
      <circle cx="-8" cy="-6" r="5" fill="#fff9c4"/>
      <circle cx="2" cy="-10" r="4" fill="#fff9c4"/>
      <circle cx="4" cy="-2" r="3" fill="#ffee58"/>
    </g>
    <g transform="translate(500 190) scale(0.6)">
      <circle cx="0" cy="0" r="6" fill="#fff9c4"/>
      <circle cx="10" cy="-4" r="5" fill="#fff9c4"/>
      <circle cx="-8" cy="-6" r="5" fill="#fff9c4"/>
      <circle cx="2" cy="-10" r="4" fill="#fff9c4"/>
      <circle cx="4" cy="-2" r="3" fill="#ffee58"/>
    </g>
    <g transform="translate(140 520) scale(0.5)">
      <circle cx="0" cy="0" r="6" fill="#fff9c4"/>
      <circle cx="10" cy="-4" r="5" fill="#fff9c4"/>
      <circle cx="-8" cy="-6" r="5" fill="#fff9c4"/>
      <circle cx="4" cy="-2" r="3" fill="#ffee58"/>
    </g>
    <g transform="translate(460 530) scale(0.55)">
      <circle cx="0" cy="0" r="6" fill="#fff9c4"/>
      <circle cx="10" cy="-4" r="5" fill="#fff9c4"/>
      <circle cx="-8" cy="-6" r="5" fill="#fff9c4"/>
      <circle cx="4" cy="-2" r="3" fill="#ffee58"/>
    </g>
  </g>

  <!-- Honey drip on side -->
  <g filter="url(#inner-glow-l)">
    <path d="M398 280 Q412 290 410 320 Q408 345 400 350 L400 280 Z" fill="#e6a800" opacity="0.7"/>
  </g>

  <!-- Jar body -->
  <g filter="url(#shadow-l)">
    <path d="M195 200 Q195 160 220 145 L380 145 Q405 160 405 200 L405 440 Q405 480 370 490 L230 490 Q195 480 195 440 Z" fill="url(#jar-l)"/>

    <!-- Glass reflection -->
    <path d="M205 200 Q205 170 225 155 L240 155 Q215 170 215 200 L215 430 Q215 465 235 475 L225 478 Q205 468 205 430 Z" fill="url(#glass-l)" opacity="0.7"/>

    <!-- Honey level line -->
    <path d="M195 210 Q300 225 405 210" fill="none" stroke="#d4a017" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Label -->
  <g>
    <rect x="220" y="310" width="160" height="130" rx="8" fill="url(#label-l)" stroke="#c8a44e" stroke-width="1.5"/>
    <!-- Label inner border -->
    <rect x="228" y="318" width="144" height="114" rx="5" fill="none" stroke="#dcc176" stroke-width="0.75" stroke-dasharray="3 2"/>

    <!-- Linden flower on label -->
    <g transform="translate(300 350)">
      <ellipse cx="-10" cy="0" rx="8" ry="5" fill="#a5d6a7" transform="rotate(-40 -10 0)"/>
      <ellipse cx="10" cy="0" rx="8" ry="5" fill="#a5d6a7" transform="rotate(40 10 0)"/>
      <ellipse cx="0" cy="-8" rx="7" ry="4" fill="#a5d6a7" transform="rotate(0 0 -8)"/>
      <circle cx="0" cy="0" r="4" fill="#ffd54f"/>
      <circle cx="-2" cy="-1" r="1.5" fill="#ffee58"/>
    </g>

    <!-- Label text -->
    <text x="300" y="388" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="18" font-weight="700" fill="#4e342e" letter-spacing="1">MIÓD</text>
    <text x="300" y="408" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="14" fill="#6d4c41" letter-spacing="3">LIPOWY</text>

    <!-- Decorative line -->
    <line x1="255" y1="418" x2="345" y2="418" stroke="#c8a44e" stroke-width="1"/>
    <text x="300" y="432" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8d6e63" letter-spacing="2">PASIEKA LAS</text>
  </g>

  <!-- Jar neck -->
  <rect x="235" y="130" width="130" height="22" rx="4" fill="#6d4c41"/>

  <!-- Lid top -->
  <path d="M245 130 Q245 105 260 98 L340 98 Q355 105 355 130 Z" fill="url(#lid-l)"/>
  <!-- Lid highlight -->
  <path d="M258 108 Q260 102 275 100 L300 100 Q268 102 262 112 Z" fill="#a1887f" opacity="0.5"/>

  <!-- Cloth / ribbon detail -->
  <path d="M230 138 Q300 152 370 138" fill="none" stroke="#c8a44e" stroke-width="2"/>
  <circle cx="300" cy="146" r="4" fill="#c8a44e"/>

  <!-- Tiny bee -->
  <g transform="translate(440 270) rotate(-15)" opacity="0.35">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#ffd54f"/>
    <line x1="-3" y1="-2" x2="-3" y2="2" stroke="#4e342e" stroke-width="1.5"/>
    <line x1="2" y1="-2" x2="2" y2="2" stroke="#4e342e" stroke-width="1.5"/>
    <ellipse cx="-5" cy="-6" rx="6" ry="4" fill="#ffffff" opacity="0.5" transform="rotate(-20 -5 -6)"/>
    <ellipse cx="5" cy="-6" rx="6" ry="4" fill="#ffffff" opacity="0.5" transform="rotate(20 5 -6)"/>
  </g>

  <!-- Weight badge -->
  <g transform="translate(300 520)">
    <rect x="-30" y="-12" width="60" height="24" rx="12" fill="#4e342e" opacity="0.08"/>
    <text x="0" y="5" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8d6e63">500 g</text>
  </g>
</svg>
